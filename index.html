<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İyi ki Doğdun Ablacım!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510; /* Daha koyu arka plan */
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Havai fişek kanvası */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .book-container {
            width: 80%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .page {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 192, 203, 0.3);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        }

        .page.active { display: block; animation: fadeIn 1s ease-in; }

        .page img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .orchid {
            position: fixed;
            top: -50px;
            font-size: 24px;
            z-index: 5;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-buttons { margin-top: 20px; }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #ff69b4;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="book-container">
        <div class="page active">
            <img src="resim1.jpg" alt="Anı 1">
            <p>Canım ablam, ilk sayfamız seninle olan bu güzel ana ayrıldı.</p>
        </div>
        <div class="page">
            <img src="resim2.jpg" alt="Anı 2">
            <p>Her zaman gülümsemenle etrafını aydınlat.</p>
        </div>
        <div class="page">
            <img src="resim3.jpg" alt="Anı 3">
            <p>Hayatın bu orkideler kadar zarif ve güzel olsun.</p>
        </div>
        <div class="page">
            <img src="resim4.jpg" alt="Anı 4">
            <p>Birlikte daha nice maceralara!</p>
        </div>
        <div class="page">
            <img src="resim5.jpg" alt="Anı 5">
            <p>Senin kardeşin olduğum için çok şanslıyım.</p>
        </div>
        <div class="page">
            <img src="resim6.jpg" alt="Anı 6">
            <p>İyi ki doğdun ablacım! Seni çok seviyorum.</p>
        </div>

        <div class="nav-buttons">
            <button onclick="changePage(-1)">Geri</button>
            <button onclick="changePage(1)">İleri</button>
        </div>
    </div>

    <script>
        // Sayfa Değiştirme
        let currentPage = 0;
        const pages = document.querySelectorAll('.page');
        function changePage(step) {
            pages[currentPage].classList.remove('active');
            currentPage = (currentPage + step + pages.length) % pages.length;
            pages[currentPage].classList.add('active');
            // Sayfa her değiştiğinde bir kelebek patlat
            createButterflyFirework(window.innerWidth / 2, window.innerHeight / 2);
        }

        // Orkide Düşürme
        function createOrchid() {
            const orchid = document.createElement('div');
            orchid.classList.add('orchid');
            orchid.innerHTML = '🌸'; 
            orchid.style.left = Math.random() * 100 + 'vw';
            orchid.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(orchid);
            setTimeout(() => { orchid.remove(); }, 6000);
        }
        setInterval(createOrchid, 500);

        // Kelebek Havai Fişek Sistemi (Canvas)
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        class Particle {
            constructor(x, y, color, angle, speed) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
                this.alpha = 1;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createButterflyFirework(x, y) {
            const color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            // Kelebek kanat formu için matematiksel döngü
            for (let i = 0; i < 100; i++) {
                const angle = (i / 100) * Math.PI * 2;
                // Kelebek eğrisi formülü (basitleştirilmiş)
                const r = (Math.exp(Math.cos(angle)) - 2 * Math.cos(4 * angle) + Math.pow(Math.sin(angle / 12), 5));
                const speed = r * 2;
                particles.push(new Particle(x, y, color, angle, speed));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Rastgele aralıklarla kelebek patlat
        setInterval(() => {
            createButterflyFirework(Math.random() * canvas.width, Math.random() * canvas.height);
        }, 2000);
    </script>
</body>
</html>
